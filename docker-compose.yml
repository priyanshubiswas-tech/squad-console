name: squad-console

networks:
  squadnet:
    driver: bridge

volumes:
  clickhouse_data:
  charts_data:
  chroma_data:
  airflow_home:

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    networks:
      - squadnet
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # native protocol
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./database/clickhouse/init:/docker-entrypoint-initdb.d:ro
    env_file: .env
    healthcheck:
      # 127.0.0.1, not localhost: localhost resolves to ::1 first, and
      # ClickHouse doesn't bind IPv6 under Docker Desktop (IPv6 disabled by
      # default) - wget would fail on the IPv6 attempt before ever trying v4.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  chroma:
    image: chromadb/chroma:0.5.20
    networks:
      - squadnet
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/heartbeat"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    networks:
      - squadnet
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - charts_data:/app/charts
    depends_on:
      clickhouse:
        condition: service_healthy
      chroma:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_KEY: ${API_KEY}
    networks:
      - squadnet
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    networks:
      - squadnet
    ports:
      - "8080:8080"  # Airflow UI - not routed through Nginx, local-only by design
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      # _AIRFLOW_WWW_USER_USERNAME/_PASSWORD are NOT read by `airflow standalone`
      # (that's a LocalExecutor docker-compose convention) - standalone always
      # generates its own admin user + random password on first init instead,
      # written to /opt/airflow/standalone_admin_password.txt. On a fresh
      # airflow_home volume, reset it to something memorable with:
      #   docker compose exec airflow airflow users reset-password -u admin -p admin
      # Distinct from the shared CLICKHOUSE_HOST in .env (see ingestion/.../config.py)
      # - this is what lets the ELT pipeline run unmodified in-network here.
      INGESTION_CLICKHOUSE_HOST: clickhouse
    env_file: .env
    volumes:
      - airflow_home:/opt/airflow
      - ./airflow/dags:/opt/airflow/dags
      - ./ingestion/elt-pipeline-py-script:/opt/airflow/ingestion
    depends_on:
      clickhouse:
        condition: service_healthy
    command: standalone
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    networks:
      - squadnet
    ports:
      - "80:80"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 5s
      timeout: 5s
      retries: 10
